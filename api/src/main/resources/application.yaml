server:
  port: ${API_PORT:9084}

spring:
  application:
    name: monarch-proxy
  jackson:
    default-property-inclusion: NON_NULL

monarch:
  # JSON file holding the session token + email + lastVerifiedAt.
  # Bootstrap CLI writes it; service loads it at startup + on-demand via /v1/auth/refresh.
  session-path: ${MONARCH_SESSION_PATH:${user.home}/.config/monarch-proxy/.mm-session.json}
  base-url: ${MONARCH_BASE_URL:https://api.monarch.com}
  request-timeout-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.nicholasklaene.monarchproxy: INFO
